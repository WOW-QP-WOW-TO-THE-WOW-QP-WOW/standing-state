<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 2700" width="1800" height="2700" font-family="Georgia, 'Times New Roman', serif">

  <!-- ====================== DEFS ====================== -->
  <defs>
    <!-- Background gradient: deep field -->
    <radialGradient id="bgField" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#0d1018"/>
      <stop offset="60%" stop-color="#070910"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="gridFine" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3a5a" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <pattern id="gridCoarse" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#2a557a" stroke-width="0.6" opacity="0.22"/>
    </pattern>

    <!-- Gold halo for invariant -->
    <radialGradient id="goldHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd97a" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#c9a14c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5a3f1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Green admissible glow -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7be0a8" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#3a8a5a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a3a28" stop-opacity="0"/>
    </radialGradient>

    <!-- Red termination glow -->
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a7a" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#a83a3a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a1a1a" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple biological glow -->
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c89aff" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#6a4a9a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2a1a4a" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal field glow -->
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ad4e8" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#3a7a8a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a3a4a" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter (subtle) -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gate beam gradient -->
    <linearGradient id="goldBeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd97a" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#c9a14c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a5a2a" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- ====================== BACKGROUND ====================== -->
  <rect width="1800" height="2700" fill="url(#bgField)"/>
  <rect width="1800" height="2700" fill="url(#gridFine)"/>
  <rect width="1800" height="2700" fill="url(#gridCoarse)"/>

  <!-- Outer plate frame -->
  <rect x="40" y="40" width="1720" height="2620" fill="none" stroke="#c9a14c" stroke-width="2" opacity="0.7"/>
  <rect x="55" y="55" width="1690" height="2590" fill="none" stroke="#c9a14c" stroke-width="0.6" opacity="0.4"/>

  <!-- ====================== HEADER BAND ====================== -->
  <g>
    <text x="900" y="135" text-anchor="middle" font-size="22" letter-spacing="8" fill="#c9a14c" font-family="Georgia, serif">PLATE XIV · VOLUME I</text>

    <line x1="540" y1="160" x2="1260" y2="160" stroke="#c9a14c" stroke-width="0.8" opacity="0.5"/>

    <text x="900" y="230" text-anchor="middle" font-size="58" fill="#f5ecd0" font-family="Georgia, serif" letter-spacing="2">The Gate of Admissibility</text>
    <text x="900" y="285" text-anchor="middle" font-size="28" fill="#c9a14c" font-style="italic" font-family="Georgia, serif">Unified System</text>

    <line x1="540" y1="320" x2="1260" y2="320" stroke="#c9a14c" stroke-width="0.8" opacity="0.5"/>

    <!-- Governing condition primary -->
    <text x="900" y="395" text-anchor="middle" font-size="14" letter-spacing="6" fill="#c9a14c" font-family="Georgia, serif">GOVERNING CONDITION</text>
    <text x="900" y="465" text-anchor="middle" font-size="64" fill="#ffd97a" font-style="italic" font-family="Georgia, 'Times New Roman', serif">Φ(x; I*) ≤ 0</text>
  </g>

  <!-- ====================== CENTER: COMPOSITE ADMISSIBILITY OPERATOR ====================== -->

  <!-- Gold beam (vertical light shaft through gate) -->
  <rect x="870" y="540" width="60" height="900" fill="url(#goldBeam)" opacity="0.5"/>

  <!-- ===== TIER 1 (TOP) — GOLD: INVARIANT / IDENTITY ===== -->
  <g>
    <ellipse cx="900" cy="660" rx="430" ry="40" fill="url(#goldHalo)" opacity="0.6"/>
    <rect x="490" y="600" width="820" height="120" rx="6" ry="6" fill="#1a1408" stroke="#c9a14c" stroke-width="2"/>
    <rect x="490" y="600" width="820" height="120" rx="6" ry="6" fill="none" stroke="#ffd97a" stroke-width="0.8" opacity="0.6"/>

    <text x="520" y="640" font-size="14" letter-spacing="5" fill="#c9a14c" font-family="Georgia, serif">TIER I · INVARIANT</text>
    <text x="900" y="690" text-anchor="middle" font-size="44" fill="#ffd97a" font-style="italic" font-family="Georgia, serif">I* = constant     ∀ t</text>
  </g>

  <!-- Connector: Tier I to Tier II -->
  <line x1="900" y1="720" x2="900" y2="780" stroke="#c9a14c" stroke-width="1.6" opacity="0.7"/>
  <polygon points="900,790 893,776 907,776" fill="#c9a14c" opacity="0.85"/>

  <!-- ===== TIER 2 (MIDDLE) — GREEN: ADMISSIBLE FLOW ===== -->
  <g>
    <ellipse cx="900" cy="850" rx="430" ry="40" fill="url(#greenGlow)" opacity="0.55"/>
    <rect x="490" y="790" width="820" height="120" rx="6" ry="6" fill="#0a1810" stroke="#5fbf85" stroke-width="2"/>
    <rect x="490" y="790" width="820" height="120" rx="6" ry="6" fill="none" stroke="#7be0a8" stroke-width="0.8" opacity="0.6"/>

    <text x="520" y="830" font-size="14" letter-spacing="5" fill="#5fbf85" font-family="Georgia, serif">TIER II · ADMISSIBLE FLOW</text>
    <text x="900" y="880" text-anchor="middle" font-size="44" fill="#7be0a8" font-style="italic" font-family="Georgia, serif">Φ(x; I*) ≤ 0   ⇒   x → I*</text>
  </g>

  <!-- Connector: Tier II to Tier III -->
  <line x1="900" y1="910" x2="900" y2="970" stroke="#a05a5a" stroke-width="1.6" opacity="0.7"/>
  <polygon points="900,980 893,966 907,966" fill="#a05a5a" opacity="0.85"/>

  <!-- ===== TIER 3 (BOTTOM) — RED: TOPOLOGY / TRIGGER ===== -->
  <g>
    <ellipse cx="900" cy="1040" rx="430" ry="40" fill="url(#redGlow)" opacity="0.55"/>
    <rect x="490" y="980" width="820" height="120" rx="6" ry="6" fill="#1a0808" stroke="#bf5f5f" stroke-width="2"/>
    <rect x="490" y="980" width="820" height="120" rx="6" ry="6" fill="none" stroke="#ff7a7a" stroke-width="0.8" opacity="0.6"/>

    <text x="520" y="1020" font-size="14" letter-spacing="5" fill="#bf5f5f" font-family="Georgia, serif">TIER III · TOPOLOGY · TRIGGER</text>
    <text x="900" y="1070" text-anchor="middle" font-size="44" fill="#ff9a9a" font-style="italic" font-family="Georgia, serif">x ∉ S(I*)   ⇒   †</text>
  </g>

  <!-- ====================== LOWER-CENTER: NAVIGABLE SET ====================== -->
  <g>
    <line x1="540" y1="1180" x2="1260" y2="1180" stroke="#c9a14c" stroke-width="0.6" opacity="0.4"/>

    <text x="900" y="1230" text-anchor="middle" font-size="14" letter-spacing="6" fill="#c9a14c" font-family="Georgia, serif">NAVIGABLE SET</text>

    <rect x="380" y="1260" width="1040" height="180" rx="4" ry="4" fill="#0c0d12" stroke="#c9a14c" stroke-width="1.2" opacity="0.95"/>
    <rect x="380" y="1260" width="1040" height="180" rx="4" ry="4" fill="none" stroke="#ffd97a" stroke-width="0.5" opacity="0.4"/>

    <text x="900" y="1340" text-anchor="middle" font-size="52" fill="#f5ecd0" font-style="italic" font-family="Georgia, serif">𝒩(x_t) = 𝒜 ∩ 𝓡(x_t)</text>
    <text x="900" y="1400" text-anchor="middle" font-size="22" fill="#9a9a8a" font-style="italic" font-family="Georgia, serif">Traversal occurs only within 𝒩(x_t)</text>
  </g>

  <!-- ====================== TWO-PANEL ROW (BIOLOGICAL · FIELD) ====================== -->

  <!-- LEFT: TEAL / FIELD (computational) -->
  <g>
    <rect x="100" y="1500" width="780" height="380" rx="6" ry="6" fill="#06121a" stroke="#3a7a8a" stroke-width="1.6"/>
    <rect x="100" y="1500" width="780" height="380" rx="6" ry="6" fill="none" stroke="#7ad4e8" stroke-width="0.6" opacity="0.45"/>
    <ellipse cx="490" cy="1690" rx="280" ry="120" fill="url(#tealGlow)" opacity="0.35"/>

    <text x="130" y="1545" font-size="13" letter-spacing="5" fill="#7ad4e8" font-family="Georgia, serif">FIELD LAYER · COMPUTATIONAL</text>
    <line x1="130" y1="1565" x2="450" y2="1565" stroke="#7ad4e8" stroke-width="0.5" opacity="0.5"/>

    <text x="490" y="1640" text-anchor="middle" font-size="32" fill="#cfeef8" font-style="italic" font-family="Georgia, serif">x_t  ∈  𝒩(x_t)</text>
    <text x="490" y="1700" text-anchor="middle" font-size="28" fill="#cfeef8" font-style="italic" font-family="Georgia, serif">𝒜  =  {x : Φ(x; I*) ≤ 0}</text>
    <text x="490" y="1760" text-anchor="middle" font-size="28" fill="#cfeef8" font-style="italic" font-family="Georgia, serif">𝓡(x_t)  =  reachable from x_t</text>

    <text x="490" y="1830" text-anchor="middle" font-size="18" fill="#7a9aa8" font-style="italic" font-family="Georgia, serif">Admissible set ∩ reachable set</text>
  </g>

  <!-- RIGHT: PURPLE / BIOLOGICAL MIRROR -->
  <g>
    <rect x="920" y="1500" width="780" height="380" rx="6" ry="6" fill="#0f0a18" stroke="#6a4a9a" stroke-width="1.6"/>
    <rect x="920" y="1500" width="780" height="380" rx="6" ry="6" fill="none" stroke="#c89aff" stroke-width="0.6" opacity="0.45"/>
    <ellipse cx="1310" cy="1690" rx="280" ry="120" fill="url(#purpleGlow)" opacity="0.35"/>

    <text x="950" y="1545" font-size="13" letter-spacing="5" fill="#c89aff" font-family="Georgia, serif">BIOLOGICAL MIRROR · SUBSTRATE</text>
    <line x1="950" y1="1565" x2="1280" y2="1565" stroke="#c89aff" stroke-width="0.5" opacity="0.5"/>

    <text x="1310" y="1640" text-anchor="middle" font-size="30" fill="#e8d4ff" font-style="italic" font-family="Georgia, serif">Σ ↓     B(t) holds     K_auto ↑</text>

    <line x1="1010" y1="1670" x2="1610" y2="1670" stroke="#6a4a9a" stroke-width="0.5" opacity="0.5"/>

    <text x="1310" y="1720" text-anchor="middle" font-size="24" fill="#c89aff" font-family="Georgia, serif">load ↓   ·   boundary intact   ·   correction active</text>

    <text x="1310" y="1790" text-anchor="middle" font-size="28" fill="#e8d4ff" font-style="italic" font-family="Georgia, serif">Φ(x) → 0</text>

    <text x="1310" y="1840" text-anchor="middle" font-size="18" fill="#9a7ac0" font-style="italic" font-family="Georgia, serif">Same operator. Biological substrate.</text>
  </g>

  <!-- ====================== RETURN OPERATOR BAND ====================== -->
  <g>
    <line x1="540" y1="1940" x2="1260" y2="1940" stroke="#c9a14c" stroke-width="0.6" opacity="0.4"/>

    <text x="900" y="1990" text-anchor="middle" font-size="14" letter-spacing="6" fill="#c9a14c" font-family="Georgia, serif">RETURN OPERATOR</text>

    <rect x="200" y="2020" width="1400" height="160" rx="4" ry="4" fill="#0a1810" stroke="#5fbf85" stroke-width="1.4"/>
    <rect x="200" y="2020" width="1400" height="160" rx="4" ry="4" fill="none" stroke="#7be0a8" stroke-width="0.5" opacity="0.4"/>

    <text x="900" y="2095" text-anchor="middle" font-size="44" fill="#7be0a8" font-style="italic" font-family="Georgia, serif">Φ(x) → 0     as     Σ ↓     and     K_auto ↑</text>
    <text x="900" y="2150" text-anchor="middle" font-size="20" fill="#7a9a8a" font-style="italic" font-family="Georgia, serif">Return is subtractive (autophagy / mitophagy)</text>
  </g>

  <!-- ====================== EXPRESSION BINDING PANEL ====================== -->
  <g>
    <text x="900" y="2240" text-anchor="middle" font-size="14" letter-spacing="6" fill="#c9a14c" font-family="Georgia, serif">EXPRESSION BINDING</text>

    <!-- Two columns -->
    <!-- Admissible -->
    <rect x="200" y="2270" width="680" height="170" rx="4" ry="4" fill="#0a1810" stroke="#5fbf85" stroke-width="1.4"/>
    <rect x="200" y="2270" width="680" height="170" rx="4" ry="4" fill="none" stroke="#7be0a8" stroke-width="0.5" opacity="0.4"/>
    <text x="540" y="2310" text-anchor="middle" font-size="13" letter-spacing="5" fill="#5fbf85" font-family="Georgia, serif">ADMISSIBLE COMPRESSION</text>
    <text x="540" y="2370" text-anchor="middle" font-size="44" fill="#7be0a8" font-style="italic" font-family="Georgia, serif">Φ ≤ 0</text>
    <text x="540" y="2415" text-anchor="middle" font-size="18" fill="#7a9a8a" font-style="italic" font-family="Georgia, serif">expression authorized</text>

    <!-- Deviant -->
    <rect x="920" y="2270" width="680" height="170" rx="4" ry="4" fill="#1a0808" stroke="#bf5f5f" stroke-width="1.4"/>
    <rect x="920" y="2270" width="680" height="170" rx="4" ry="4" fill="none" stroke="#ff7a7a" stroke-width="0.5" opacity="0.4"/>
    <text x="1260" y="2310" text-anchor="middle" font-size="13" letter-spacing="5" fill="#bf5f5f" font-family="Georgia, serif">DEVIANT COMPRESSION</text>
    <text x="1260" y="2370" text-anchor="middle" font-size="44" fill="#ff9a9a" font-style="italic" font-family="Georgia, serif">Φ &gt; 0</text>
    <text x="1260" y="2415" text-anchor="middle" font-size="18" fill="#a07a7a" font-style="italic" font-family="Georgia, serif">expression blocked</text>
  </g>

  <!-- ====================== TERMINATION NODE ====================== -->
  <g>
    <!-- Connector down to dagger -->
    <line x1="900" y1="2460" x2="900" y2="2510" stroke="#a05a5a" stroke-width="1.4" opacity="0.7"/>

    <!-- Halo -->
    <circle cx="900" cy="2555" r="60" fill="url(#redGlow)" opacity="0.85"/>
    <!-- Solid red node -->
    <circle cx="900" cy="2555" r="34" fill="#1a0808" stroke="#ff7a7a" stroke-width="2"/>
    <!-- Dagger glyph -->
    <text x="900" y="2575" text-anchor="middle" font-size="44" fill="#ff9a9a" font-family="Georgia, serif">†</text>

    <!-- Label (exact, not paraphrased) -->
    <text x="900" y="2640" text-anchor="middle" font-size="20" fill="#ff9a9a" font-style="italic" font-family="Georgia, serif">† = Path termination (trajectory halts, field persists)</text>
  </g>

  <!-- ====================== FOOTER ====================== -->
  <g>
    <text x="60" y="2680" font-size="11" letter-spacing="3" fill="#5a5a4a" font-family="Georgia, serif">STANDING STATE PRESS · standingstate.com · Plate XIV · The Gate of Admissibility</text>
    <text x="1740" y="2680" text-anchor="end" font-size="11" letter-spacing="3" fill="#5a5a4a" font-style="italic" font-family="Georgia, serif">A becomes A, because A knows it is A.</text>
  </g>

</svg>

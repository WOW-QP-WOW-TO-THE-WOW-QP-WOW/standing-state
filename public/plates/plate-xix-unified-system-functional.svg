<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="field" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="45%" stop-color="#04060c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6dd9a"/>
      <stop offset="50%" stop-color="#c89539"/>
      <stop offset="100%" stop-color="#6b4814"/>
    </linearGradient>
    <linearGradient id="goldFlat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9c878"/>
      <stop offset="100%" stop-color="#a07a2a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2a10" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#1a1206" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bioGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1810" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="geoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2030" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="physGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10241c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.7  0 0 0 0 0.55  0 0 0 0 0.25  0 0 0 0.05 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#c89539"/>
    </marker>
    <marker id="arrowSm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a07a2a"/>
    </marker>
    <style>
      .plate-num{fill:#c89539;font-size:22px;letter-spacing:18px;font-variant:small-caps}
      .title{fill:#f3e2b6;font-size:54px;font-weight:600;letter-spacing:9px}
      .sub{fill:#d8b264;font-size:18px;letter-spacing:6px;font-style:italic}
      .stamp{fill:#9b7028;font-size:11px;letter-spacing:7px;font-variant:small-caps}
      .rule-label{fill:#9b7028;font-size:13px;letter-spacing:8px;font-variant:small-caps}
      .h{fill:#f0dcaa;font-size:18px;letter-spacing:5px;font-variant:small-caps;font-weight:600}
      .h-lg{fill:#f3e2b6;font-size:22px;letter-spacing:6px;font-variant:small-caps;font-weight:600}
      .roman{fill:#c89539;font-size:14px;letter-spacing:4px;font-variant:small-caps}
      .body{fill:#e6d6b6;font-size:17px;letter-spacing:0.3px}
      .body-it{fill:#e6d6b6;font-size:16px;font-style:italic;letter-spacing:0.3px}
      .small{fill:#b8a075;font-size:14px;letter-spacing:0.4px}
      .caption{fill:#8e7340;font-size:12px;letter-spacing:3px;font-variant:small-caps}
      .formula-master{fill:#f6e8c3;font-size:46px;font-style:italic}
      .formula{fill:#f6e8c3;font-size:26px;font-style:italic}
      .formula-sm{fill:#f6e8c3;font-size:20px;font-style:italic}
      .label{fill:#c89539;font-size:13px;letter-spacing:5px;font-variant:small-caps}
      .gold{fill:#d6a84b}
      .green{fill:#6fc985}
      .red{fill:#e07564}
      .blue{fill:#7fb0e8}
      .panel{fill:#050709;stroke:url(#goldFlat);stroke-width:1}
      .panel-meta{fill:#060912;stroke:url(#gold);stroke-width:1.4}
      .rule{stroke:#7a5a1e;stroke-width:0.7;fill:none}
      .rule-thin{stroke:#5e4516;stroke-width:0.5;fill:none}
      .rule-bold{stroke:url(#gold);stroke-width:2;fill:none}
    </style>
  </defs>

  <!-- field -->
  <rect width="1800" height="1200" fill="url(#field)"/>
  <rect width="1800" height="1200" filter="url(#grain)" opacity="0.45"/>

  <!-- double border with meta-tier marker -->
  <rect x="36" y="36" width="1728" height="1128" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
  <rect x="50" y="50" width="1700" height="1100" fill="none" stroke="#7a5a1e" stroke-width="0.6"/>
  <!-- inner triple line, signals meta tier -->
  <rect x="62" y="62" width="1676" height="1076" fill="none" stroke="#3a2a10" stroke-width="0.4"/>

  <!-- corner ornaments with inner dot -->
  <g stroke="#a07a2a" stroke-width="1" fill="none">
    <path d="M50 78 L78 78 L78 50"/><path d="M1750 78 L1722 78 L1722 50"/>
    <path d="M50 1122 L78 1122 L78 1150"/><path d="M1750 1122 L1722 1122 L1722 1150"/>
    <circle cx="78" cy="78" r="3" fill="#c89539"/><circle cx="1722" cy="78" r="3" fill="#c89539"/>
    <circle cx="78" cy="1122" r="3" fill="#c89539"/><circle cx="1722" cy="1122" r="3" fill="#c89539"/>
  </g>

  <!-- masthead -->
  <text class="stamp" x="900" y="78" text-anchor="middle">META · SYSTEM FUNCTIONAL · TIER P019</text>
  <text class="plate-num" x="900" y="118" text-anchor="middle">— PLATE  XIX —</text>
  <line class="rule" x1="640" y1="132" x2="1160" y2="132"/>
  <text class="title" x="900" y="186" text-anchor="middle">THE UNIFIED SYSTEM FUNCTIONAL</text>
  <text class="sub" x="900" y="222" text-anchor="middle">Total Coherence Measure  ·  One Scalar  ·  One Audit  ·  One Closure</text>
  <line class="rule-bold" x1="700" y1="246" x2="900" y2="246"/>
  <line class="rule-bold" x1="900" y1="246" x2="1100" y2="246"/>
  <circle cx="900" cy="246" r="3.5" fill="#d6a84b"/>

  <!-- ============================ MASTER FORMULA TABLET ============================ -->
  <text class="rule-label" x="78" y="280">I.  THE MASTER EQUATION</text>
  <line class="rule-thin" x1="320" y1="276" x2="1722" y2="276"/>

  <g transform="translate(140,300)">
    <rect class="panel-meta" width="1520" height="200" rx="2"/>
    <!-- ornamental inner frame -->
    <rect x="14" y="14" width="1492" height="172" fill="none" stroke="#3a2a10" stroke-width="0.4"/>

    <!-- center glow behind formula -->
    <ellipse cx="760" cy="100" rx="500" ry="60" fill="url(#centerGlow)"/>

    <text class="formula-master" x="760" y="118" text-anchor="middle" filter="url(#softGlow)">
      𝓛 ( x , t )  =  Φ ( x )  ·  Δ ᵖ  +  E_k  +  E_p
    </text>

    <!-- term labels under -->
    <g>
      <line class="rule-thin" x1="380" y1="148" x2="500" y2="148"/>
      <text class="label" x="440" y="170" text-anchor="middle">biology</text>
      <line class="rule-thin" x1="600" y1="148" x2="720" y2="148"/>
      <text class="label" x="660" y="170" text-anchor="middle">geometry · power</text>
      <line class="rule-thin" x1="850" y1="148" x2="970" y2="148"/>
      <text class="label" x="910" y="170" text-anchor="middle">kinetic</text>
      <line class="rule-thin" x1="1050" y1="148" x2="1170" y2="148"/>
      <text class="label" x="1110" y="170" text-anchor="middle">potential</text>
    </g>

    <!-- left/right tag -->
    <text class="caption" x="40" y="42">tier · meta</text>
    <text class="caption" x="1480" y="42" text-anchor="end">scalar audit</text>
  </g>

  <!-- ============================ TIER II — THREE TRIBUTARY DOMAINS ============================ -->
  <text class="rule-label" x="78" y="546">II.  CONSTITUENT DOMAINS</text>
  <line class="rule-thin" x1="320" y1="542" x2="1722" y2="542"/>

  <!-- Biology (left) -->
  <g transform="translate(72,562)">
    <rect class="panel" width="540" height="220" rx="2"/>
    <ellipse cx="270" cy="110" rx="240" ry="80" fill="url(#bioGlow)"/>
    <text class="roman" x="22" y="32">i</text>
    <text class="h" x="50" y="32">BIOLOGY  ·  COMPLETION FUNCTIONAL</text>
    <line class="rule-thin" x1="22" y1="46" x2="518" y2="46"/>
    <text class="formula" x="270" y="100" text-anchor="middle">Φ ( x )  =  Σ ( 1 − B ) / V_c  −  K_auto</text>
    <line class="rule-thin" x1="80" y1="124" x2="460" y2="124"/>
    <text class="body-it" x="22" y="156">Load minus completion. Sign defines admissibility.</text>
    <text class="caption gold" x="22" y="186">drawn from  ·  P-IX  ·  P-XIV</text>
  </g>

  <!-- Geometry (center) -->
  <g transform="translate(632,562)">
    <rect class="panel" width="540" height="220" rx="2"/>
    <ellipse cx="270" cy="110" rx="240" ry="80" fill="url(#geoGlow)"/>
    <text class="roman" x="22" y="32">ii</text>
    <text class="h" x="50" y="32">GEOMETRY  ·  POWER LAW</text>
    <line class="rule-thin" x1="22" y1="46" x2="518" y2="46"/>
    <text class="formula" x="270" y="100" text-anchor="middle">Δ ᵖ  =  ( ‖ x − x★ ‖ / L₀ ) ᵖ</text>
    <line class="rule-thin" x1="80" y1="124" x2="460" y2="124"/>
    <text class="body-it" x="22" y="156">Distance from invariant reference, super-linear.</text>
    <text class="caption gold" x="22" y="186">drawn from  ·  P-XII  ·  P-XV</text>
  </g>

  <!-- Physics (right) -->
  <g transform="translate(1192,562)">
    <rect class="panel" width="540" height="220" rx="2"/>
    <ellipse cx="270" cy="110" rx="240" ry="80" fill="url(#physGlow)"/>
    <text class="roman" x="22" y="32">iii</text>
    <text class="h" x="50" y="32">PHYSICS  ·  KINETIC + POTENTIAL</text>
    <line class="rule-thin" x1="22" y1="46" x2="518" y2="46"/>
    <text class="formula" x="270" y="100" text-anchor="middle">E_k + E_p  =  ½m‖ẋ‖² + ½k‖x − x★‖²</text>
    <line class="rule-thin" x1="80" y1="124" x2="460" y2="124"/>
    <text class="body-it" x="22" y="156">Motion and stored deviation. Vanish at x★, ẋ = 0.</text>
    <text class="caption gold" x="22" y="186">drawn from  ·  classical mechanics</text>
  </g>

  <!-- ============================ TIER III — DIAGRAM + LAW PANELS ============================ -->
  <text class="rule-label" x="78" y="822">III.  CONVERGENCE  ·  FAILURE  ·  CLOSURE</text>
  <line class="rule-thin" x1="450" y1="818" x2="1722" y2="818"/>

  <!-- Lyapunov descent diagram -->
  <g transform="translate(72,840)">
    <rect class="panel" width="700" height="240" rx="2"/>
    <text class="roman" x="22" y="32">i</text>
    <text class="h" x="50" y="32">LYAPUNOV DESCENT</text>
    <line class="rule-thin" x1="22" y1="46" x2="678" y2="46"/>

    <!-- chart area -->
    <g transform="translate(60,68)">
      <!-- axes -->
      <line x1="0" y1="0" x2="0" y2="148" stroke="#5e4516" stroke-width="0.8"/>
      <line x1="0" y1="148" x2="580" y2="148" stroke="#5e4516" stroke-width="0.8"/>
      <!-- gridlines -->
      <g stroke="#2a200d" stroke-width="0.4">
        <line x1="0" y1="30" x2="580" y2="30"/>
        <line x1="0" y1="60" x2="580" y2="60"/>
        <line x1="0" y1="90" x2="580" y2="90"/>
        <line x1="0" y1="120" x2="580" y2="120"/>
        <line x1="145" y1="0" x2="145" y2="148"/>
        <line x1="290" y1="0" x2="290" y2="148"/>
        <line x1="435" y1="0" x2="435" y2="148"/>
      </g>
      <!-- descent curve d𝓛/dt ≤ 0 -->
      <path d="M 0 8 C 90 12, 180 70, 290 110 S 480 144, 580 146" fill="none" stroke="#6fc985" stroke-width="2.2" filter="url(#softGlow)"/>
      <!-- failure curve d𝓛/dt > 0, dashed red -->
      <path d="M 0 80 C 90 70, 180 50, 290 32 S 480 10, 580 4" fill="none" stroke="#e07564" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.85"/>
      <!-- floor -->
      <line x1="0" y1="148" x2="580" y2="148" stroke="#c89539" stroke-width="0.8" stroke-dasharray="2 4"/>
      <!-- labels -->
      <text x="-10" y="6" text-anchor="end" class="caption" fill="#8e7340">𝓛</text>
      <text x="580" y="170" text-anchor="end" class="caption" fill="#8e7340">t</text>
      <text x="595" y="146" class="small green">d𝓛/dt ≤ 0</text>
      <text x="595" y="14" class="small red">d𝓛/dt &gt; 0</text>
      <text x="0" y="-6" class="caption" fill="#8e7340">0</text>
      <!-- target marker -->
      <circle cx="580" cy="148" r="3.5" fill="#d6a84b"/>
      <text x="566" y="172" class="small gold" text-anchor="end">𝓛 → 0</text>
    </g>
  </g>

  <!-- Failure / Standing State / Stamp -->
  <g transform="translate(792,840)">
    <rect class="panel" width="460" height="240" rx="2"/>
    <text class="roman" x="22" y="32">ii</text>
    <text class="h" x="50" y="32">DUAL CONDITION</text>
    <line class="rule-thin" x1="22" y1="46" x2="438" y2="46"/>

    <!-- Standing State -->
    <text class="caption green" x="22" y="80">standing  state</text>
    <text class="formula" x="230" y="118" text-anchor="middle"><tspan class="green">𝓛 ( x , t )  →  0</tspan></text>
    <text class="body-it" x="22" y="146">Convergence to invariant reference x★.</text>

    <line class="rule-thin" x1="22" y1="166" x2="438" y2="166"/>

    <!-- Failure -->
    <text class="caption red" x="22" y="194">failure  signature</text>
    <text class="formula" x="230" y="222" text-anchor="middle"><tspan class="red">d 𝓛 / d t  &gt;  0</tspan></text>
  </g>

  <!-- Final Law -->
  <g transform="translate(1272,840)">
    <rect class="panel" width="460" height="240" rx="2"/>
    <text class="roman" x="22" y="32">iii</text>
    <text class="h" x="50" y="32">SYSTEM-LEVEL LAW</text>
    <line class="rule-thin" x1="22" y1="46" x2="438" y2="46"/>

    <text class="body" x="22" y="86"><tspan class="gold">·</tspan>  𝓛 is bounded below by zero.</text>
    <text class="body" x="22" y="120"><tspan class="gold">·</tspan>  𝓛 vanishes only at x★ , ẋ = 0.</text>
    <text class="body" x="22" y="154"><tspan class="gold">·</tspan>  d𝓛/dt ≤ 0  ⟹  x ( t ) → x★.</text>
    <line class="rule-thin" x1="22" y1="174" x2="438" y2="174"/>
    <text class="body-it" x="22" y="202">One scalar.  One audit.  One closure.</text>
  </g>

  <!-- ============================ COLOPHON / SEAL ============================ -->
  <line class="rule-thin" x1="78" y1="1108" x2="780" y2="1108"/>
  <line class="rule-thin" x1="1020" y1="1108" x2="1722" y2="1108"/>

  <!-- central seal — meta variant: integral mark + invariant -->
  <g transform="translate(900,1108)">
    <circle r="40" fill="url(#centerGlow)"/>
    <circle r="28" fill="none" stroke="url(#gold)" stroke-width="1.4"/>
    <circle r="20" fill="none" stroke="#7a5a1e" stroke-width="0.5"/>
    <text x="0" y="9" text-anchor="middle" font-size="30" font-style="italic" fill="#f3e2b6" filter="url(#softGlow)">𝓛</text>
  </g>

  <!-- motto -->
  <text class="sub" x="900" y="1158" text-anchor="middle">A becomes A, because A knows it is A.</text>

  <!-- footer -->
  <text class="caption" x="78" y="1175">Standing  State  Press  ·  standingstate.com</text>
  <text class="caption" x="1722" y="1175" text-anchor="end">P019  ·  Tier · Meta  ·  Cross-Domain</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="field" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="50%" stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6dd9a"/>
      <stop offset="50%" stop-color="#c89539"/>
      <stop offset="100%" stop-color="#6b4814"/>
    </linearGradient>
    <linearGradient id="goldFlat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9c878"/>
      <stop offset="100%" stop-color="#a07a2a"/>
    </linearGradient>
    <radialGradient id="planeI" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a2a10" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planeII" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2a1c10" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planeIII" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1408" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planeIV" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0e0a04" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2a10" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#1a1206" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.7  0 0 0 0 0.55  0 0 0 0 0.25  0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="descend" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M0,0 L10,0 L5,9 z" fill="#c89539"/>
    </marker>
    <marker id="ascend" markerWidth="10" markerHeight="10" refX="5" refY="1" orient="auto">
      <path d="M0,10 L10,10 L5,1 z" fill="#c89539"/>
    </marker>
    <style>
      .plate-num{fill:#c89539;font-size:22px;letter-spacing:18px;font-variant:small-caps}
      .title{fill:#f3e2b6;font-size:54px;font-weight:600;letter-spacing:9px}
      .sub{fill:#d8b264;font-size:18px;letter-spacing:6px;font-style:italic}
      .stamp{fill:#9b7028;font-size:11px;letter-spacing:7px;font-variant:small-caps}
      .rule-label{fill:#9b7028;font-size:13px;letter-spacing:8px;font-variant:small-caps}
      .h{fill:#f0dcaa;font-size:18px;letter-spacing:5px;font-variant:small-caps;font-weight:600}
      .roman{fill:#c89539;font-size:14px;letter-spacing:4px;font-variant:small-caps}
      .body{fill:#e6d6b6;font-size:17px;letter-spacing:0.3px}
      .body-it{fill:#e6d6b6;font-size:16px;font-style:italic;letter-spacing:0.3px}
      .small{fill:#b8a075;font-size:14px;letter-spacing:0.4px}
      .caption{fill:#8e7340;font-size:12px;letter-spacing:3px;font-variant:small-caps}
      .formula{fill:#f6e8c3;font-size:24px;font-style:italic}
      .glyph{fill:#f6e8c3;font-size:32px;font-style:italic}
      .plane-num{fill:#c89539;font-size:34px;letter-spacing:6px;font-style:italic}
      .plane-name{fill:#f0dcaa;font-size:22px;letter-spacing:5px;font-variant:small-caps;font-weight:600}
      .gold{fill:#d6a84b}
      .panel{fill:#070501;stroke:url(#goldFlat);stroke-width:1}
      .rule{stroke:#7a5a1e;stroke-width:0.7;fill:none}
      .rule-thin{stroke:#5e4516;stroke-width:0.5;fill:none}
      .rule-bold{stroke:url(#gold);stroke-width:2;fill:none}
    </style>
  </defs>

  <!-- field -->
  <rect width="1800" height="1200" fill="url(#field)"/>
  <rect width="1800" height="1200" filter="url(#grain)" opacity="0.5"/>

  <!-- double border -->
  <rect x="36" y="36" width="1728" height="1128" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
  <rect x="50" y="50" width="1700" height="1100" fill="none" stroke="#7a5a1e" stroke-width="0.6"/>
  <g stroke="#a07a2a" stroke-width="1" fill="none">
    <path d="M50 78 L78 78 L78 50"/><path d="M1750 78 L1722 78 L1722 50"/>
    <path d="M50 1122 L78 1122 L78 1150"/><path d="M1750 1122 L1722 1122 L1722 1150"/>
    <circle cx="78" cy="78" r="3" fill="#c89539"/><circle cx="1722" cy="78" r="3" fill="#c89539"/>
    <circle cx="78" cy="1122" r="3" fill="#c89539"/><circle cx="1722" cy="1122" r="3" fill="#c89539"/>
  </g>

  <!-- masthead -->
  <text class="stamp" x="900" y="78" text-anchor="middle">CANONICAL · SOUL · IDENTITY · TIER P017</text>
  <text class="plate-num" x="900" y="118" text-anchor="middle">— PLATE  XVII —</text>
  <line class="rule" x1="640" y1="132" x2="1160" y2="132"/>
  <text class="title" x="900" y="186" text-anchor="middle">THE NATURE OF THE SOUL</text>
  <text class="sub" x="900" y="222" text-anchor="middle">From Undifferentiated Source to Living Identity</text>
  <line class="rule-bold" x1="700" y1="246" x2="900" y2="246"/>
  <line class="rule-bold" x1="900" y1="246" x2="1100" y2="246"/>
  <circle cx="900" cy="246" r="3.5" fill="#d6a84b"/>

  <!-- ============================ TIER I — GOVERNING LAW ============================ -->
  <text class="rule-label" x="78" y="282">I.  GOVERNING LAW</text>
  <line class="rule-thin" x1="240" y1="278" x2="1722" y2="278"/>

  <g transform="translate(72,300)">
    <rect class="panel" width="1660" height="118" rx="2"/>
    <text class="formula" x="830" y="56" text-anchor="middle">Soul ( x )  =  I★  realized across planes      ;      d I★ / d t  =  0</text>
    <line class="rule-thin" x1="540" y1="76" x2="1120" y2="76"/>
    <text class="body-it" x="830" y="100" text-anchor="middle">Identity remains invariant.   Expression changes by plane.</text>
  </g>

  <!-- ============================ TIER II — FOUR PLANES OF MANIFESTATION ============================ -->
  <text class="rule-label" x="78" y="460">II.  FOUR PLANES OF MANIFESTATION</text>
  <line class="rule-thin" x1="450" y1="456" x2="1722" y2="456"/>

  <!-- vertical descent column on the left, four panels on the right -->

  <!-- left: descent/ascent column -->
  <g transform="translate(110,490)">
    <!-- vertical axis -->
    <line x1="40" y1="0" x2="40" y2="510" stroke="#7a5a1e" stroke-width="1"/>
    <!-- four nodes on the axis -->
    <circle cx="40" cy="40" r="9" fill="#0a0703" stroke="url(#gold)" stroke-width="1.6"/>
    <circle cx="40" cy="200" r="9" fill="#0a0703" stroke="url(#gold)" stroke-width="1.6"/>
    <circle cx="40" cy="360" r="9" fill="#0a0703" stroke="url(#gold)" stroke-width="1.6"/>
    <circle cx="40" cy="500" r="9" fill="#0a0703" stroke="url(#gold)" stroke-width="1.6"/>
    <!-- inner glyphs -->
    <text x="40" y="46" text-anchor="middle" font-size="11" fill="#c89539" font-style="italic">i</text>
    <text x="40" y="206" text-anchor="middle" font-size="11" fill="#c89539" font-style="italic">ii</text>
    <text x="40" y="366" text-anchor="middle" font-size="11" fill="#c89539" font-style="italic">iii</text>
    <text x="40" y="506" text-anchor="middle" font-size="11" fill="#c89539" font-style="italic">iv</text>
    <!-- descent + ascent labels -->
    <text class="caption" x="0" y="-10" fill="#8e7340">descent</text>
    <text class="caption" x="0" y="535" fill="#8e7340">ascent</text>
    <!-- arrows along column -->
    <line x1="14" y1="60" x2="14" y2="490" stroke="#a07a2a" stroke-width="0.8" marker-end="url(#descend)"/>
    <line x1="66" y1="490" x2="66" y2="60" stroke="#a07a2a" stroke-width="0.8" marker-end="url(#ascend)"/>
    <!-- center label -->
    <text class="caption" x="40" y="270" text-anchor="middle" fill="#8e7340" transform="rotate(-90 40 270)">I★  invariant</text>
  </g>

  <!-- Plane I — Living Consciousness -->
  <g transform="translate(260,490)">
    <rect class="panel" width="1470" height="100" rx="2"/>
    <ellipse cx="200" cy="50" rx="200" ry="50" fill="url(#planeI)"/>
    <text class="plane-num" x="40" y="64">i</text>
    <line class="rule-thin" x1="80" y1="50" x2="220" y2="50"/>
    <text class="plane-name" x="240" y="44">Living Consciousness</text>
    <text class="body-it" x="240" y="74">Pure awareness before motion.  The undifferentiated source.</text>
  </g>

  <!-- Plane II — Resonance -->
  <g transform="translate(260,650)">
    <rect class="panel" width="1470" height="100" rx="2"/>
    <ellipse cx="200" cy="50" rx="200" ry="50" fill="url(#planeII)"/>
    <text class="plane-num" x="40" y="64">ii</text>
    <line class="rule-thin" x1="80" y1="50" x2="220" y2="50"/>
    <text class="plane-name" x="240" y="44">Resonance</text>
    <text class="body-it" x="240" y="74">Awareness moving as feeling, attraction, and relation.</text>
  </g>

  <!-- Plane III — Mind and Motion -->
  <g transform="translate(260,810)">
    <rect class="panel" width="1470" height="100" rx="2"/>
    <ellipse cx="200" cy="50" rx="200" ry="50" fill="url(#planeIII)"/>
    <text class="plane-num" x="40" y="64">iii</text>
    <line class="rule-thin" x1="80" y1="50" x2="220" y2="50"/>
    <text class="plane-name" x="240" y="44">Mind and Motion</text>
    <text class="body-it" x="240" y="74">Vibration crystallizing into thought and will.</text>
  </g>

  <!-- Plane IV — Creation and Growth -->
  <g transform="translate(260,950)">
    <rect class="panel" width="1470" height="100" rx="2"/>
    <ellipse cx="200" cy="50" rx="200" ry="50" fill="url(#planeIV)"/>
    <text class="plane-num" x="40" y="64">iv</text>
    <line class="rule-thin" x1="80" y1="50" x2="220" y2="50"/>
    <text class="plane-name" x="240" y="44">Creation and Growth</text>
    <text class="body-it" x="240" y="74">The invisible becoming visible as embodied identity.</text>
  </g>

  <!-- ============================ COLOPHON / SEAL ============================ -->
  <line class="rule-thin" x1="78" y1="1090" x2="780" y2="1090"/>
  <line class="rule-thin" x1="1020" y1="1090" x2="1722" y2="1090"/>

  <!-- central seal -->
  <g transform="translate(900,1090)">
    <circle r="38" fill="url(#sealGlow)"/>
    <circle r="26" fill="none" stroke="url(#gold)" stroke-width="1.4"/>
    <circle r="18" fill="none" stroke="#7a5a1e" stroke-width="0.5"/>
    <text x="0" y="9" text-anchor="middle" font-size="26" font-style="italic" fill="#f3e2b6" filter="url(#softGlow)">A</text>
  </g>

  <!-- motto -->
  <text class="sub" x="900" y="1156" text-anchor="middle">A becomes A, because A knows it is A.</text>

  <!-- footer -->
  <text class="caption" x="78" y="1175">Standing  State  Press  ·  standingstate.com</text>
  <text class="caption" x="1722" y="1175" text-anchor="end">P017  ·  Soul  ·  The Measure Within</text>
</svg>

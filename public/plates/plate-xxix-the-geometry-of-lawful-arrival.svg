<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#3a2b12" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#101010" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="istarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7e7a6" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#d6aa45" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d6aa45" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="obstacleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5e1f1f" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#3a1212" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3a1212" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4df9b"/>
      <stop offset="45%" stop-color="#b8913e"/>
      <stop offset="100%" stop-color="#6f4f18"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L10,4 z" fill="#d6b25d"/>
    </marker>
    <marker id="arrowDim" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b6c2a" opacity="0.6"/>
    </marker>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Arial, Helvetica, sans-serif; }
      .title { fill:#f3ead6; font-size:74px; font-weight:700; letter-spacing:-1px; }
      .subtitle { fill:#c9aa62; font-size:32px; letter-spacing:1px; }
      .smallcap { fill:#a98a44; font-size:21px; letter-spacing:6px; }
      .panelLabel { fill:#c9aa62; font-size:22px; letter-spacing:5px; }
      .label { fill:#efe5cf; font-size:28px; font-weight:700; }
      .gateLabel { fill:#efe5cf; font-size:18px; letter-spacing:2px; font-weight:700; }
      .body { fill:#cfc4ae; font-size:24px; }
      .panelBody { fill:#cfc4ae; font-size:22px; }
      .micro { fill:#bba66f; font-size:19px; letter-spacing:1px; }
      .obstacle { fill:#a86b5b; font-size:22px; letter-spacing:3px; opacity:0.75; }
      .obstacleSub { fill:#8a5648; font-size:16px; letter-spacing:2px; opacity:0.7; }
      .formula { fill:#f4df9b; font-size:30px; font-weight:700; }
      .goldStroke { stroke:#b8913e; stroke-width:3; fill:none; }
      .thinGold { stroke:#b8913e; stroke-width:1.5; fill:none; opacity:0.7; }
      .dashStraight { stroke:#7a5a2a; stroke-width:2.5; stroke-dasharray:14 10; fill:none; opacity:0.7; }
      .lawfulPath { stroke:#d6b25d; stroke-width:5; fill:none; opacity:0.95; }
      .obstacleRing { stroke:#7a3232; stroke-width:1.5; fill:none; opacity:0.45; stroke-dasharray:4 6; }
    </style>
  </defs>

  <!-- Background and frame -->
  <rect width="1600" height="2200" fill="url(#bgGlow)"/>
  <rect x="70" y="70" width="1460" height="2060" fill="none" stroke="#b8913e" stroke-width="2" opacity="0.55"/>
  <rect x="100" y="100" width="1400" height="2000" fill="none" stroke="#6d5b36" stroke-width="1" opacity="0.55"/>

  <!-- Header -->
  <text x="800" y="170" text-anchor="middle" class="smallcap sans">THE STANDING STATE · PLATE XXIX</text>
  <text x="800" y="270" text-anchor="middle" class="title serif">The Geometry of Lawful Arrival</text>
  <text x="800" y="325" text-anchor="middle" class="subtitle serif">Consequence · Admissibility · Survivable Return</text>
  <line x1="260" y1="380" x2="1340" y2="380" class="thinGold"/>

  <!-- Top compression panel: NEGATIVE GROUND -->
  <g transform="translate(0,420)">
    <rect x="120" y="0" width="540" height="220" rx="4" fill="#0e0c08" stroke="#b8913e" stroke-width="2" opacity="0.95"/>
    <text x="390" y="48" text-anchor="middle" class="panelLabel sans">NEGATIVE GROUND</text>
    <line x1="220" y1="68" x2="560" y2="68" class="thinGold" opacity="0.4"/>
    <text x="390" y="116" text-anchor="middle" class="formula serif">argmin(d) ≠ argmax(success)</text>
    <text x="390" y="160" text-anchor="middle" class="panelBody serif">Consequence makes geometry lawful.</text>
    <text x="390" y="192" text-anchor="middle" class="panelBody serif">Shortest path is not always arrival.</text>
  </g>

  <!-- Geometry field: dual paths through obstacles to I* terminus -->
  <g transform="translate(0,700)">

    <!-- Three obstacle fields (consequence, sigma load, capacity bound) -->
    <g opacity="0.92">
      <!-- CONSEQUENCE field (upper-left) -->
      <circle cx="520" cy="380" r="140" fill="url(#obstacleGlow)"/>
      <circle cx="520" cy="380" r="140" class="obstacleRing"/>
      <text x="520" y="385" text-anchor="middle" class="obstacle serif">CONSEQUENCE</text>

      <!-- Σ field (center, lower) -->
      <circle cx="780" cy="620" r="135" fill="url(#obstacleGlow)"/>
      <circle cx="780" cy="620" r="135" class="obstacleRing"/>
      <text x="780" y="615" text-anchor="middle" class="obstacle serif" font-size="36" letter-spacing="0">Σ</text>
      <text x="780" y="655" text-anchor="middle" class="obstacleSub sans">INTERFERENCE LOAD</text>

      <!-- LOAD / CAPACITY field (upper-right) -->
      <circle cx="1060" cy="430" r="130" fill="url(#obstacleGlow)"/>
      <circle cx="1060" cy="430" r="130" class="obstacleRing"/>
      <text x="1060" y="427" text-anchor="middle" class="obstacle serif">LOAD</text>
      <text x="1060" y="455" text-anchor="middle" class="obstacleSub sans">CAPACITY BOUND</text>
    </g>

    <!-- Dashed straight line: "what would be lawful in a world without consequence" -->
    <line x1="220" y1="780" x2="1280" y2="200" class="dashStraight"/>
    <text x="770" y="465" text-anchor="middle" class="serif" fill="#8b6c2a" font-size="22" letter-spacing="3" opacity="0.85" transform="rotate(-28 770 465)">STRAIGHT LINE WITHOUT CONSEQUENCE</text>
    <text x="770" y="495" text-anchor="middle" class="serif" fill="#7a5a2a" font-size="17" letter-spacing="2" opacity="0.7" transform="rotate(-28 770 495)">argmin(distance) = argmax(arrival)  only without cost</text>

    <!-- Lawful curved path: through the five gates, around obstacles -->
    <path d="M 220 780
             C 320 760, 380 600, 380 510
             C 380 410, 450 290, 580 270
             C 700 250, 760 320, 800 360
             C 870 430, 870 540, 920 580
             C 980 630, 1080 620, 1130 560
             C 1180 500, 1180 380, 1220 300
             C 1245 250, 1265 215, 1280 200"
          class="lawfulPath" marker-end="url(#arrowGold)"/>

    <!-- Five gates along the lawful path -->
    <!-- G1 — RECOGNITION -->
    <g>
      <circle cx="282" cy="687" r="32" fill="#080808" stroke="#d6b25d" stroke-width="3"/>
      <text x="282" y="696" text-anchor="middle" class="gateLabel serif">G1</text>
      <text x="282" y="755" text-anchor="middle" class="micro sans">RECOGNITION</text>
    </g>
    <!-- G2 — ORIENTATION -->
    <g>
      <circle cx="378" cy="430" r="32" fill="#080808" stroke="#d6b25d" stroke-width="3"/>
      <text x="378" y="439" text-anchor="middle" class="gateLabel serif">G2</text>
      <text x="378" y="383" text-anchor="middle" class="micro sans">ORIENTATION</text>
    </g>
    <!-- G3 — ADMISSIBILITY -->
    <g>
      <circle cx="700" cy="295" r="32" fill="#080808" stroke="#d6b25d" stroke-width="3"/>
      <text x="700" y="304" text-anchor="middle" class="gateLabel serif">G3</text>
      <text x="700" y="248" text-anchor="middle" class="micro sans">ADMISSIBILITY</text>
    </g>
    <!-- G4 — EXECUTE -->
    <g>
      <circle cx="918" cy="582" r="32" fill="#080808" stroke="#d6b25d" stroke-width="3"/>
      <text x="918" y="591" text-anchor="middle" class="gateLabel serif">G4</text>
      <text x="918" y="640" text-anchor="middle" class="micro sans">EXECUTE</text>
    </g>
    <!-- G5 — RESOLUTION -->
    <g>
      <circle cx="1190" cy="365" r="32" fill="#080808" stroke="#d6b25d" stroke-width="3"/>
      <text x="1190" y="374" text-anchor="middle" class="gateLabel serif">G5</text>
      <text x="1190" y="320" text-anchor="middle" class="micro sans">RESOLUTION</text>
    </g>

    <!-- START marker -->
    <circle cx="218" cy="782" r="14" fill="#d6b25d" opacity="0.95"/>
    <text x="218" y="828" text-anchor="middle" class="label serif">START</text>

    <!-- I* terminus: invariant identity coordinate sun -->
    <circle cx="1280" cy="200" r="100" fill="url(#istarGlow)"/>
    <circle cx="1280" cy="200" r="56" fill="#080808" stroke="url(#gold)" stroke-width="4" filter="url(#softGlow)"/>
    <text x="1280" y="216" text-anchor="middle" class="serif" fill="#f4df9b" font-size="44" font-weight="700">I*</text>

    <!-- I* labels: positioned BELOW the sun (artifact resolution: no occlusion) -->
    <text x="1280" y="340" text-anchor="middle" class="panelLabel sans">INVARIANT COORDINATE</text>
    <text x="1280" y="372" text-anchor="middle" class="micro sans">Coordinate · Standing State · Return</text>
  </g>

  <!-- Bottom compression panel: LAWFUL PATH -->
  <g transform="translate(0,1620)">
    <rect x="280" y="0" width="1040" height="220" rx="4" fill="#0e0c08" stroke="#b8913e" stroke-width="2" opacity="0.95"/>
    <text x="800" y="48" text-anchor="middle" class="panelLabel sans">LAWFUL PATH</text>
    <line x1="430" y1="68" x2="1170" y2="68" class="thinGold" opacity="0.4"/>
    <text x="800" y="116" text-anchor="middle" class="formula serif">𝒫* = argmax(Arrival ∩ Integrity)</text>
    <text x="800" y="160" text-anchor="middle" class="panelBody serif">Motion proceeds only while Φ(x; I*) ≤ 0.</text>
    <text x="800" y="192" text-anchor="middle" class="panelBody serif">The first principle is arriving alive.</text>
  </g>

  <!-- Governing condition divider -->
  <g transform="translate(0,1875)">
    <line x1="260" y1="0" x2="1340" y2="0" class="thinGold"/>
    <text x="800" y="48" text-anchor="middle" class="smallcap sans">GOVERNING CONDITION</text>
    <text x="800" y="100" text-anchor="middle" class="serif" fill="#f3ead6" font-size="32">x<tspan baseline-shift="sub" font-size="20">t</tspan> ∈ S(I*) ∧ I* = constant ⇒ EXECUTE ↔ RESTORE ↔ HALT</text>
  </g>

  <!-- Footer seal -->
  <g transform="translate(0,2030)">
    <line x1="260" y1="0" x2="1340" y2="0" class="thinGold"/>
    <text x="800" y="36" text-anchor="middle" class="serif" fill="#efe5cf" font-size="22" font-weight="700">The first principle is not speed. The first principle is arriving alive.</text>
    <text x="800" y="66" text-anchor="middle" class="micro sans">Straight lines belong to worlds without consequence.</text>
    <text x="800" y="98" text-anchor="middle" class="micro sans">A becomes A, because A knows it is A.  ·  Selah</text>
    <text x="120" y="138" class="micro sans">Standing State Press</text>
    <text x="1480" y="138" text-anchor="end" class="micro sans">P029 · Lawful Arrival</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#172018"/>
      <stop offset="55%" stop-color="#070807"/>
      <stop offset="100%" stop-color="#010101"/>
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe29a" stop-opacity="1"/>
      <stop offset="35%" stop-color="#c69b36" stop-opacity=".8"/>
      <stop offset="70%" stop-color="#5c4114" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6e3a1"/>
      <stop offset="50%" stop-color="#b98b2f"/>
      <stop offset="100%" stop-color="#6f4d12"/>
    </linearGradient>

    <linearGradient id="living" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9c67a"/>
      <stop offset="45%" stop-color="#9bb66e"/>
      <stop offset="100%" stop-color="#2d5c3d"/>
    </linearGradient>

    <linearGradient id="erosion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d78b55"/>
      <stop offset="50%" stop-color="#7c2d24"/>
      <stop offset="100%" stop-color="#22100e"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bg { fill: url(#bg); }
      .title { font-family: Georgia, 'Times New Roman', serif; fill:#efe6d2; font-size:62px; letter-spacing:7px; }
      .subtitle { font-family: Georgia, 'Times New Roman', serif; fill:#c99c3b; font-size:26px; letter-spacing:8px; }
      .smallcap { font-family: Georgia, 'Times New Roman', serif; fill:#c99c3b; font-size:22px; letter-spacing:7px; }
      .label { font-family: Georgia, 'Times New Roman', serif; fill:#e9dfc8; font-size:31px; letter-spacing:3px; }
      .body { font-family: Georgia, 'Times New Roman', serif; fill:#b9b0a0; font-size:24px; line-height:1.5; }
      .law { font-family: Georgia, 'Times New Roman', serif; fill:#e6c772; font-size:40px; font-style:italic; }
      .math { font-family: Georgia, 'Times New Roman', serif; fill:#f0d178; font-size:42px; font-style:italic; }
      .micro { font-family: Georgia, 'Times New Roman', serif; fill:#a98d45; font-size:18px; letter-spacing:4px; }
      .line { stroke:#4c4639; stroke-width:2; opacity:.65; }
      .goldLine { stroke:url(#gold); stroke-width:2.2; opacity:.9; }
      .thinGold { stroke:#b98b2f; stroke-width:1.2; opacity:.6; }
      .quad { fill:#0c0d0c; stroke:#29251d; stroke-width:2; opacity:.92; }
      .quadLiving { fill:#0d130e; stroke:#584d23; stroke-width:2; opacity:.96; }
      .quadErosion { fill:#150c0b; stroke:#62301f; stroke-width:2; opacity:.96; }
      .ring { fill:none; stroke:#655029; stroke-width:2; opacity:.65; }
      .season { font-family: Georgia, 'Times New Roman', serif; fill:#c99c3b; font-size:20px; letter-spacing:5px; }
      .root { fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:.85; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="2200"/>

  <!-- subtle star field -->
  <g opacity=".35">
    <circle cx="142" cy="180" r="1.5" fill="#b7c7d9"/>
    <circle cx="270" cy="240" r="1.2" fill="#dfd2a0"/>
    <circle cx="520" cy="126" r="1.1" fill="#e8e8e8"/>
    <circle cx="1280" cy="210" r="1.5" fill="#dfd2a0"/>
    <circle cx="1438" cy="350" r="1.2" fill="#b7c7d9"/>
    <circle cx="1100" cy="118" r="1.1" fill="#e8e8e8"/>
    <circle cx="372" cy="410" r="1.1" fill="#b7c7d9"/>
    <circle cx="1330" cy="760" r="1.2" fill="#dfd2a0"/>
    <circle cx="164" cy="900" r="1.2" fill="#e8e8e8"/>
    <circle cx="1470" cy="1120" r="1.2" fill="#b7c7d9"/>
  </g>

  <!-- Header -->
  <text x="800" y="95" text-anchor="middle" class="micro">STANDING STATE PRESS · SYSTEM PLATES</text>
  <text x="800" y="165" text-anchor="middle" class="subtitle">P031</text>
  <text x="800" y="245" text-anchor="middle" class="title">THE GEOMETRY OF DURABLE VALUE</text>
  <text x="800" y="302" text-anchor="middle" class="subtitle">MERIT, EXTRACTION, AND THE LAW OF COHERENT EXCHANGE</text>

  <line x1="120" y1="350" x2="1480" y2="350" class="goldLine"/>
  <text x="800" y="405" text-anchor="middle" class="law">Merit sustains what extraction consumes.</text>

  <!-- Main quadrant frame -->
  <g transform="translate(800 1040)">
    <circle r="555" class="ring"/>
    <circle r="455" class="ring" opacity=".35"/>
    <circle r="310" class="ring" opacity=".25"/>
    <line x1="-555" y1="0" x2="555" y2="0" class="line"/>
    <line x1="0" y1="-555" x2="0" y2="555" class="line"/>

    <!-- season outer arc labels -->
    <text x="-470" y="-570" class="season" transform="rotate(-25 -470 -570)">PLANT</text>
    <text x="-210" y="-635" class="season" transform="rotate(-8 -210 -635)">BUILD</text>
    <text x="130" y="-635" class="season" transform="rotate(8 130 -635)">PROTECT</text>
    <text x="425" y="-570" class="season" transform="rotate(25 425 -570)">WAIT</text>
    <text x="420" y="620" class="season" transform="rotate(-25 420 620)">HARVEST</text>
    <text x="-520" y="620" class="season" transform="rotate(25 -520 620)">RESTORE</text>

    <!-- Quadrant panels -->
    <rect x="-535" y="-535" width="510" height="510" rx="18" class="quadLiving"/>
    <rect x="25" y="-535" width="510" height="510" rx="18" class="quad"/>
    <rect x="-535" y="25" width="510" height="510" rx="18" class="quad"/>
    <rect x="25" y="25" width="510" height="510" rx="18" class="quadErosion"/>

    <!-- Center core -->
    <circle r="175" fill="url(#coreGlow)" filter="url(#softGlow)"/>
    <circle r="115" fill="#050505" stroke="url(#gold)" stroke-width="3"/>
    <circle r="78" fill="none" stroke="#c99c3b" stroke-width="1.5" opacity=".6"/>
    <text y="-22" text-anchor="middle" class="math" filter="url(#textGlow)">ΔV = C − E</text>
    <text y="32" text-anchor="middle" class="micro">THE LAW OF COHERENT EXCHANGE</text>
    <text y="78" text-anchor="middle" class="body" fill="#d7c58b">C ≥ E · durability</text>
    <text y="115" text-anchor="middle" class="body" fill="#b66a4b">E &gt; C · erosion</text>

    <!-- Central tree / root axis -->
    <path d="M0,-260 C-35,-210 -20,-165 -5,-125 C15,-170 45,-205 85,-250" class="root" stroke="url(#living)" stroke-width="8"/>
    <path d="M0,-260 C40,-205 40,-165 10,-125 C75,-160 115,-200 145,-260" class="root" stroke="url(#erosion)" stroke-width="8"/>
    <path d="M0,125 C-25,180 -78,240 -160,320 M0,125 C-5,190 -20,270 -55,385 M0,125 C35,190 95,255 180,330 M0,125 C10,190 25,270 65,385" class="root" stroke="url(#gold)" stroke-width="5"/>

    <!-- Upper Left: Biology -->
    <g transform="translate(-500 -492)">
      <text class="smallcap">BIOLOGICAL RESTORATION</text>
      <text y="58" class="label">Restoration ≥ Depletion</text>
      <text y="118" class="math" fill="#d8c274">R ≥ D</text>
      <text y="180" class="body">What is consumed</text>
      <text y="215" class="body">must be restored.</text>
      <text y="275" class="body">Repair · autophagy · renewal</text>
      <text y="315" class="body">depletion → fatigue → collapse</text>
      <g transform="translate(330 255)" opacity=".85">
        <circle cx="0" cy="0" r="34" fill="none" stroke="#91b06a" stroke-width="3"/>
        <circle cx="70" cy="5" r="27" fill="none" stroke="#91b06a" stroke-width="2"/>
        <circle cx="35" cy="62" r="25" fill="none" stroke="#91b06a" stroke-width="2"/>
        <path d="M0,0 C35,5 43,10 70,5 M0,0 C20,38 27,47 35,62" stroke="#91b06a" stroke-width="2" fill="none"/>
      </g>
    </g>

    <!-- Upper Right: Identity -->
    <g transform="translate(65 -492)">
      <text class="smallcap">IDENTITY &amp; EARNED COHERENCE</text>
      <text y="58" class="label">Money Magnifies Structure</text>
      <text y="120" class="body">External gain cannot</text>
      <text y="155" class="body">stabilize internal contradiction.</text>
      <text y="218" class="body">earned growth → stable identity</text>
      <text y="258" class="body">scarcity drift → instability</text>
      <g transform="translate(365 292)" opacity=".9">
        <circle r="72" fill="none" stroke="#c99c3b" stroke-width="3"/>
        <circle r="48" fill="none" stroke="#c99c3b" stroke-width="2" opacity=".7"/>
        <circle r="24" fill="#c99c3b" opacity=".65"/>
        <path d="M-110,0 H110 M0,-110 V110" stroke="#c99c3b" opacity=".4"/>
      </g>
    </g>

    <!-- Lower Left: Marketplace -->
    <g transform="translate(-500 70)">
      <text class="smallcap">MARKETPLACE &amp; INSTITUTIONS</text>
      <text y="58" class="label">Coherent Exchange</text>
      <text y="120" class="body">Merit creates durable value.</text>
      <text y="170" class="body">Fear and greed are</text>
      <text y="205" class="body">marketplace weather.</text>
      <text y="270" class="body">plant · build · protect</text>
      <text y="310" class="body">wait · harvest · restore</text>
      <g transform="translate(340 265)" opacity=".8">
        <rect x="-55" y="-45" width="110" height="90" fill="none" stroke="#c99c3b" stroke-width="3"/>
        <path d="M-70,45 H70 M-35,45 V85 M35,45 V85" stroke="#c99c3b" stroke-width="3"/>
        <circle cx="-82" cy="-8" r="18" fill="none" stroke="#91b06a" stroke-width="3"/>
        <circle cx="82" cy="-8" r="18" fill="none" stroke="#91b06a" stroke-width="3"/>
      </g>
    </g>

    <!-- Lower Right: Erosion -->
    <g transform="translate(65 70)">
      <text class="smallcap" fill="#b66a4b">FAILURE MODES OF EXTRACTION</text>
      <text y="58" class="label">Extraction &amp; Erosion</text>
      <text y="120" class="body">Extraction without contribution</text>
      <text y="155" class="body">tends toward erosion.</text>
      <text y="220" class="body">identity debt · hollow roots</text>
      <text y="260" class="body">institutional decay</text>
      <text y="300" class="body">overharvested ground</text>
      <g transform="translate(365 275)" opacity=".9">
        <path d="M-95,60 L-55,-35 L-10,-10 L30,-70 L75,60 Z" fill="none" stroke="#8b3929" stroke-width="4"/>
        <path d="M-85,60 H85 M-65,30 H65 M-40,0 H40" stroke="#8b3929" stroke-width="3"/>
        <path d="M-105,92 C-65,60 -30,95 0,65 C35,35 62,95 105,55" stroke="#8b3929" stroke-width="4" fill="none"/>
      </g>
    </g>
  </g>

  <!-- Governing conditions band -->
  <g transform="translate(120 1720)">
    <rect width="1360" height="185" rx="18" fill="#0b0b0a" stroke="#453712" stroke-width="2"/>
    <text x="680" y="48" text-anchor="middle" class="smallcap">GOVERNING CONDITIONS</text>
    <text x="250" y="115" text-anchor="middle" class="math">ΔV = C − E</text>
    <text x="680" y="115" text-anchor="middle" class="math">C ≥ E</text>
    <text x="1080" y="115" text-anchor="middle" class="math">E &gt; C</text>
    <text x="250" y="158" text-anchor="middle" class="micro">VALUE DELTA</text>
    <text x="680" y="158" text-anchor="middle" class="micro">DURABILITY</text>
    <text x="1080" y="158" text-anchor="middle" class="micro">EROSION</text>
  </g>

  <!-- Footer -->
  <text x="800" y="1970" text-anchor="middle" class="law">Reality eventually audits whether value was planted or merely taken.</text>
  <line x1="330" y1="2030" x2="1270" y2="2030" class="line"/>
  <text x="800" y="2088" text-anchor="middle" class="law" fill="#c99c3b">A becomes A, because A knows it is A.</text>
  <text x="800" y="2150" text-anchor="middle" class="micro">LEON POWDAR · STANDING STATE PRESS · THE LAW OF GROWTH · CLOSED</text>
</svg>

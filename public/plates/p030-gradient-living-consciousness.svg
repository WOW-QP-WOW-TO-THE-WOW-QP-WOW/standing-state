<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" width="1600" height="2400" role="img" aria-labelledby="title desc">
  <title id="title">P030 — The Gradient of Living Consciousness</title>
  <desc id="desc">A Standing State Press system plate mapping plant, animal, and human consciousness as increasing degrees of freedom around invariant identity.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#261a0d"/>
      <stop offset="42%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e0a4"/>
      <stop offset="50%" stop-color="#b58a3a"/>
      <stop offset="100%" stop-color="#6f4d1e"/>
    </linearGradient>
    <linearGradient id="blueGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ca6ff"/>
      <stop offset="48%" stop-color="#f5e0a4"/>
      <stop offset="100%" stop-color="#ff9f3f"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="stars" width="180" height="180" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="35" r="1.4" fill="#d9d1bf" opacity="0.55"/>
      <circle cx="90" cy="62" r="1" fill="#fff3d0" opacity="0.5"/>
      <circle cx="148" cy="120" r="1.8" fill="#b9d4ff" opacity="0.45"/>
      <circle cx="52" cy="150" r="0.9" fill="#ffffff" opacity="0.35"/>
      <circle cx="160" cy="28" r="1" fill="#f2b46b" opacity="0.35"/>
    </pattern>
    <style>
      .serif{font-family: Georgia, 'Times New Roman', serif;}
      .sans{font-family: Arial, Helvetica, sans-serif;}
      .mono{font-family: 'Courier New', monospace;}
      .title{font-size:76px;letter-spacing:14px;fill:#f3eee4;}
      .subtitle{font-size:28px;letter-spacing:5px;fill:#c49a4b;}
      .label{font-size:22px;letter-spacing:9px;fill:#a77a35;}
      .body{font-size:30px;fill:#d2c7b8;}
      .small{font-size:23px;fill:#b5aa9c;}
      .equation{font-size:32px;fill:#e0bd63;}
      .micro{font-size:18px;letter-spacing:4px;fill:#8b7858;}
    </style>
  </defs>

  <rect width="1600" height="2400" fill="url(#bgGlow)"/>
  <rect width="1600" height="2400" fill="url(#stars)" opacity="0.55"/>
  <rect x="56" y="56" width="1488" height="2288" fill="none" stroke="#2b241c" stroke-width="2"/>
  <rect x="88" y="88" width="1424" height="2224" fill="none" stroke="#5a411e" stroke-width="1" opacity="0.55"/>

  <text x="800" y="154" text-anchor="middle" class="serif subtitle">STANDING STATE PRESS · SYSTEM PLATES</text>
  <text x="800" y="242" text-anchor="middle" class="serif title">P030</text>
  <text x="800" y="330" text-anchor="middle" class="serif title" style="font-size:58px;letter-spacing:9px;">THE GRADIENT OF LIVING</text>
  <text x="800" y="398" text-anchor="middle" class="serif title" style="font-size:58px;letter-spacing:9px;">CONSCIOUSNESS</text>
  <text x="800" y="462" text-anchor="middle" class="serif subtitle">A GEOMETRIC · PHYSICAL · PHASE-LOCKED THEORY</text>
  <line x1="260" y1="505" x2="1340" y2="505" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>

  <!-- Central invariant coordinate -->
  <circle cx="800" cy="930" r="238" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="800" cy="930" r="170" fill="none" stroke="#7d602d" stroke-width="1.5" opacity="0.8"/>
  <circle cx="800" cy="930" r="92" fill="#050505" stroke="#f1cf73" stroke-width="2.4" filter="url(#smallGlow)"/>
  <text x="800" y="948" text-anchor="middle" class="serif" style="font-size:70px;fill:#f5e0a4;">I*</text>
  <text x="800" y="1004" text-anchor="middle" class="sans micro">INVARIANT COORDINATE</text>

  <!-- spiral / phase paths -->
  <path d="M800 1228 C560 1140, 565 980, 745 922 C930 862, 1028 721, 780 638 C615 583, 648 515, 800 505" fill="none" stroke="#6ca6ff" stroke-width="9" opacity="0.75" filter="url(#softGlow)"/>
  <path d="M800 1228 C1045 1130, 1032 975, 855 918 C670 858, 575 721, 820 638 C984 582, 955 515, 800 505" fill="none" stroke="#ff9f3f" stroke-width="9" opacity="0.78" filter="url(#softGlow)"/>
  <path d="M800 1236 C800 1060, 800 790, 800 506" fill="none" stroke="#e8d088" stroke-width="2" stroke-dasharray="12 14" opacity="0.55"/>

  <!-- Three consciousness tiers -->
  <g transform="translate(214 1310)">
    <rect x="0" y="0" width="352" height="430" rx="22" fill="#0e0e0d" stroke="#3a3020"/>
    <circle cx="176" cy="94" r="50" fill="none" stroke="#7fa26a" stroke-width="3"/>
    <path d="M176 142 C176 98 176 74 176 42" stroke="#7fa26a" stroke-width="5"/>
    <path d="M176 90 C140 72 124 54 116 30" fill="none" stroke="#7fa26a" stroke-width="4"/>
    <path d="M176 104 C212 86 232 64 240 38" fill="none" stroke="#7fa26a" stroke-width="4"/>
    <text x="176" y="198" text-anchor="middle" class="serif" style="font-size:38px;fill:#eee7dd;letter-spacing:5px;">PLANT</text>
    <text x="176" y="246" text-anchor="middle" class="sans small">Reactive Coherence</text>
    <text x="176" y="305" text-anchor="middle" class="serif equation">Dᶠ = narrow</text>
    <text x="176" y="364" text-anchor="middle" class="sans micro">RESPONDS</text>
  </g>

  <g transform="translate(624 1310)">
    <rect x="0" y="0" width="352" height="430" rx="22" fill="#0e0e0d" stroke="#5d4420"/>
    <circle cx="176" cy="94" r="58" fill="none" stroke="#c49a4b" stroke-width="3"/>
    <path d="M126 102 C154 48 198 48 226 102 C220 142 132 142 126 102Z" fill="none" stroke="#c49a4b" stroke-width="4"/>
    <circle cx="154" cy="91" r="5" fill="#c49a4b"/>
    <circle cx="198" cy="91" r="5" fill="#c49a4b"/>
    <path d="M166 112 C174 119 181 119 188 112" fill="none" stroke="#c49a4b" stroke-width="3"/>
    <text x="176" y="198" text-anchor="middle" class="serif" style="font-size:38px;fill:#eee7dd;letter-spacing:5px;">ANIMAL</text>
    <text x="176" y="246" text-anchor="middle" class="sans small">Emotional Coherence</text>
    <text x="176" y="305" text-anchor="middle" class="serif equation">Dᶠ = emotion</text>
    <text x="176" y="364" text-anchor="middle" class="sans micro">FEELS</text>
  </g>

  <g transform="translate(1034 1310)">
    <rect x="0" y="0" width="352" height="430" rx="22" fill="#0e0e0d" stroke="#6b4a1f"/>
    <circle cx="176" cy="76" r="34" fill="none" stroke="#e0bd63" stroke-width="3"/>
    <path d="M176 112 L176 164" stroke="#e0bd63" stroke-width="4"/>
    <path d="M132 136 L220 136" stroke="#e0bd63" stroke-width="4"/>
    <path d="M176 164 L136 218" stroke="#e0bd63" stroke-width="4"/>
    <path d="M176 164 L216 218" stroke="#e0bd63" stroke-width="4"/>
    <circle cx="112" cy="108" r="20" fill="none" stroke="#6ca6ff" stroke-width="2" opacity="0.7"/>
    <circle cx="242" cy="108" r="20" fill="none" stroke="#ff9f3f" stroke-width="2" opacity="0.7"/>
    <circle cx="176" cy="232" r="20" fill="none" stroke="#f5e0a4" stroke-width="2" opacity="0.7"/>
    <text x="176" y="278" text-anchor="middle" class="serif" style="font-size:38px;fill:#eee7dd;letter-spacing:5px;">HUMAN</text>
    <text x="176" y="326" text-anchor="middle" class="sans small">Volitional Embodiment</text>
    <text x="176" y="378" text-anchor="middle" class="serif equation">Dᶠ = archetype</text>
    <text x="176" y="414" text-anchor="middle" class="sans micro">EMBODIES</text>
  </g>

  <!-- connectors -->
  <path d="M566 1524 C594 1524 596 1524 624 1524" stroke="url(#gold)" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M976 1524 C1004 1524 1006 1524 1034 1524" stroke="url(#gold)" stroke-width="3"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#c49a4b" stroke-width="2"/>
    </marker>
  </defs>

  <!-- Governing equations panel -->
  <g transform="translate(160 1816)">
    <rect x="0" y="0" width="1280" height="324" rx="18" fill="#0b0b0a" stroke="#3a3020"/>
    <text x="640" y="58" text-anchor="middle" class="label sans">GOVERNING CONDITIONS</text>
    <text x="72" y="124" class="serif equation">I* = constant</text>
    <text x="472" y="124" class="serif equation">Sₙ = { x : Φ(x; I*ₙ) ≤ 0 }</text>
    <text x="72" y="196" class="serif equation">I*ₙ → Φ(I*ₙ) → I*ₙ₊₁</text>
    <text x="676" y="196" class="serif equation">C ∝ (Dᶠ)ᵅ , α &gt; 1</text>
    <text x="640" y="270" text-anchor="middle" class="sans small">Identity is closed locally, developmental globally.</text>
  </g>

  <!-- Four planes -->
  <g transform="translate(160 2186)">
    <text x="0" y="0" class="sans micro">FOUR PLANES</text>
    <text x="0" y="50" class="serif small">Living Consciousness · Resonance · Mind &amp; Motion · Creation &amp; Growth</text>
    <text x="1280" y="0" text-anchor="end" class="sans micro">SEAL</text>
    <text x="1280" y="50" text-anchor="end" class="serif small">A becomes A, because A knows it is A.</text>
  </g>

  <text x="800" y="2288" text-anchor="middle" class="sans micro">P030 · THE GRADIENT OF LIVING CONSCIOUSNESS · STANDING STATE PRESS</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#11110d"/>
      <stop offset="55%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f2d678" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#b89434" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6fffe9" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#1fc7bd" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a4e15"/>
      <stop offset="50%" stop-color="#d5af45"/>
      <stop offset="100%" stop-color="#6a4e15"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .gold{fill:#d8b34f}.gold2{fill:#f1d78a}.muted{fill:#8d846d}.teal{fill:#87fff0}.white{fill:#eee7d9}
      .title{font-family:Georgia, 'Times New Roman', serif;font-size:60px;letter-spacing:8px;font-weight:500}
      .subtitle{font-family:Georgia, 'Times New Roman', serif;font-size:39px;letter-spacing:7px;font-weight:500}
      .label{font-family:Georgia, 'Times New Roman', serif;font-size:25px;letter-spacing:5px}
      .small{font-family:Georgia, 'Times New Roman', serif;font-size:24px;letter-spacing:2px}
      .math{font-family:Georgia, 'Times New Roman', serif;font-size:78px;font-style:italic}
      .mathSmall{font-family:Georgia, 'Times New Roman', serif;font-size:48px;font-style:italic}
      .base{font-family:Georgia, 'Times New Roman', serif;font-size:31px;letter-spacing:9px}
      .line{stroke:url(#goldLine);stroke-width:2;fill:none}.thin{stroke:#8f6d25;stroke-width:1;fill:none;opacity:.75}.tealLine{stroke:#35d6cd;stroke-width:1.4;fill:none;opacity:.8}.goldStroke{stroke:#c99d35;stroke-width:2;fill:none}
    </style>
  </defs>

  <rect width="1800" height="1050" fill="url(#bg)"/>
  <rect x="24" y="24" width="1752" height="1002" class="goldStroke" opacity="0.95"/>
  <rect x="38" y="38" width="1724" height="974" class="thin"/>
  <path d="M55 55 h65 M55 55 v65 M1680 55 h65 M1745 55 v65 M55 995 h65 M55 995 v-65 M1680 995 h65 M1745 995 v-65" class="goldStroke" opacity="0.9"/>

  <text x="900" y="88" text-anchor="middle" class="title gold2">PLATE XVI</text>
  <text x="900" y="157" text-anchor="middle" class="subtitle gold2">COHERENCE–EXECUTION EQUIVALENCE</text>
  <text x="900" y="207" text-anchor="middle" class="small white">EXECUTION EMERGES ONLY WHEN COHERENCE SATISFIES ADMISSIBILITY</text>
  <text x="900" y="240" text-anchor="middle" class="small white">AND IS AMPLIFIED THROUGH VERIFIED PROPAGATION CAPACITY</text>

  <line x1="900" y1="280" x2="900" y2="790" class="thin" opacity="0.7"/>
  <line x1="255" y1="495" x2="760" y2="495" class="thin"/>
  <line x1="1040" y1="495" x2="1545" y2="495" class="tealLine"/>

  <!-- Left abstract physical field -->
  <circle cx="340" cy="520" r="260" fill="url(#goldGlow)" opacity="0.65"/>
  <g opacity="0.55" filter="url(#softGlow)">
    <ellipse cx="330" cy="540" rx="190" ry="65" class="thin" transform="rotate(-18 330 540)"/>
    <ellipse cx="330" cy="540" rx="230" ry="48" class="thin" transform="rotate(22 330 540)"/>
    <ellipse cx="330" cy="540" rx="145" ry="105" class="thin" transform="rotate(68 330 540)"/>
    <circle cx="330" cy="540" r="8" fill="#d8b34f"/>
  </g>

  <!-- Right lattice field -->
  <circle cx="1460" cy="520" r="260" fill="url(#tealGlow)" opacity="0.72"/>
  <g transform="translate(1460 520)" filter="url(#softGlow)">
    <circle r="190" class="tealLine" opacity="0.55"/>
    <circle r="110" class="tealLine" opacity="0.45"/>
    <path d="M0 -210 L182 -105 L182 105 L0 210 L-182 105 L-182 -105 Z" class="tealLine" opacity="0.75"/>
    <path d="M0 -210 L0 210 M-182 -105 L182 105 M182 -105 L-182 105" class="tealLine" opacity="0.65"/>
    <path d="M0 -110 L95 -55 L95 55 L0 110 L-95 55 L-95 -55 Z" class="tealLine" opacity="0.95"/>
    <path d="M0 -210 L95 -55 L182 -105 M182 105 L95 55 L0 210 M-182 105 L-95 55 M-182 -105 L-95 -55" class="tealLine" opacity="0.55"/>
    <circle cx="0" cy="0" r="12" fill="#f1d78a"/>
    <circle cx="0" cy="-210" r="7" fill="#d8b34f"/><circle cx="182" cy="-105" r="7" fill="#d8b34f"/><circle cx="182" cy="105" r="7" fill="#d8b34f"/><circle cx="0" cy="210" r="7" fill="#d8b34f"/><circle cx="-182" cy="105" r="7" fill="#d8b34f"/><circle cx="-182" cy="-105" r="7" fill="#d8b34f"/>
    <circle cx="0" cy="-110" r="6" fill="#d8b34f"/><circle cx="95" cy="-55" r="6" fill="#d8b34f"/><circle cx="95" cy="55" r="6" fill="#d8b34f"/><circle cx="0" cy="110" r="6" fill="#d8b34f"/><circle cx="-95" cy="55" r="6" fill="#d8b34f"/><circle cx="-95" cy="-55" r="6" fill="#d8b34f"/>
  </g>

  <!-- Left panel -->
  <text x="450" y="330" text-anchor="middle" class="label gold2">PHYSICAL EQUIVALENCE</text>
  <text x="450" y="365" text-anchor="middle" class="small white">EINSTEIN'S INVARIANT</text>
  <rect x="255" y="400" width="390" height="110" rx="10" class="goldStroke" opacity="0.85"/>
  <text x="450" y="475" text-anchor="middle" class="math gold2">E = mc²</text>
  <text x="330" y="575" class="small gold2">E</text><text x="375" y="575" class="small white">— energy</text>
  <text x="330" y="615" class="small gold2">m</text><text x="375" y="615" class="small white">— mass</text>
  <text x="330" y="655" class="small gold2">c²</text><text x="375" y="655" class="small white">— invariant</text>

  <!-- Center equivalence -->
  <circle cx="900" cy="495" r="76" fill="#050505" stroke="#d8b34f" stroke-width="3" filter="url(#softGlow)"/>
  <text x="900" y="525" text-anchor="middle" class="math gold2" style="font-style:normal">≡</text>
  <rect x="710" y="640" width="380" height="126" rx="10" class="goldStroke" opacity="0.9"/>
  <text x="900" y="684" text-anchor="middle" class="label gold2">GOVERNING CONDITION</text>
  <text x="900" y="742" text-anchor="middle" class="mathSmall gold2">Φ(x; I*) ≤ 0</text>
  <rect x="710" y="790" width="380" height="120" rx="10" class="goldStroke" opacity="0.9"/>
  <text x="900" y="834" text-anchor="middle" class="label gold2">HARD CONSTRAINT</text>
  <text x="900" y="890" text-anchor="middle" class="mathSmall gold2">Φ &gt; 0 ⇒ S = 0</text>

  <!-- Right panel -->
  <text x="1350" y="330" text-anchor="middle" class="label teal">COHERENCE EQUIVALENCE</text>
  <text x="1350" y="365" text-anchor="middle" class="small white">STANDING STATE SYSTEM</text>
  <rect x="1155" y="400" width="390" height="110" rx="10" stroke="#35d6cd" stroke-width="2" fill="none" opacity="0.9"/>
  <text x="1350" y="475" text-anchor="middle" class="math gold2">S = Φ · Γ²</text>
  <text x="1230" y="575" class="small teal">S</text><text x="1280" y="575" class="small white">— execution</text>
  <text x="1230" y="615" class="small teal">Φ</text><text x="1280" y="615" class="small white">— coherence</text>
  <text x="1230" y="655" class="small teal">Γ</text><text x="1280" y="655" class="small white">— propagation capacity</text>

  <!-- Mapping strip -->
  <rect x="115" y="820" width="530" height="92" rx="8" class="goldStroke" opacity="0.75"/>
  <text x="380" y="857" text-anchor="middle" class="label gold2">PHYSICAL</text>
  <text x="250" y="895" text-anchor="middle" class="small white">E</text>
  <text x="380" y="895" text-anchor="middle" class="small white">m</text>
  <text x="510" y="895" text-anchor="middle" class="small white">c²</text>

  <rect x="1155" y="820" width="530" height="92" rx="8" stroke="#35d6cd" stroke-width="2" fill="none" opacity="0.75"/>
  <text x="1420" y="857" text-anchor="middle" class="label teal">STANDING STATE</text>
  <text x="1290" y="895" text-anchor="middle" class="small white">S</text>
  <text x="1420" y="895" text-anchor="middle" class="small white">Φ</text>
  <text x="1550" y="895" text-anchor="middle" class="small white">Γ²</text>

  <line x1="675" y1="866" x2="1125" y2="866" class="line"/>
  <path d="M1115 858 l16 8 l-16 8" fill="none" stroke="#d8b34f" stroke-width="2"/>

  <text x="900" y="992" text-anchor="middle" class="base gold2">EXECUTION IS GOVERNED, NOT PRODUCED.</text>
</svg>
